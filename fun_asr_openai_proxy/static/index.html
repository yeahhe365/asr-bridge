<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASR Bridge</title>
    <link rel="icon" type="image/png" href="/static/favicon.png" />
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>ASR Bridge</h1>
          <p>百炼 Fun-ASR、豆包语音识别的 OpenAI 兼容转写代理</p>
        </div>
        <div class="status" id="service-status">检查中</div>
      </header>

      <section class="panel settings-panel">
        <div class="panel-heading">
          <h2>默认设置</h2>
          <button class="icon-button" id="reload-settings" type="button" title="刷新默认设置">
            ↻
          </button>
        </div>
        <form id="settings-form" class="grid-form">
          <label>
            <span>识别语言</span>
            <select id="language-hints" name="language_hints">
              <option value="">自动判断</option>
              <option value="zh">中文</option>
              <option value="en">英文</option>
              <option value="zh,en">中文 + 英文</option>
            </select>
          </label>
          <label>
            <span>热词表</span>
            <input
              id="vocabulary-id"
              name="vocabulary_id"
              placeholder="不填则不用热词表"
              autocomplete="off"
            />
          </label>
          <button type="submit">保存默认设置</button>
        </form>
        <p class="hint">不确定就保持自动判断，热词表可以留空。</p>
      </section>

      <section class="workspace">
        <section class="panel">
          <div class="panel-heading">
            <h2>创建热词表</h2>
            <button class="icon-button" id="add-word" type="button" title="添加热词">
              +
            </button>
          </div>
          <form id="vocabulary-form" class="stack">
            <div class="grid-form">
              <label>
                <span>前缀</span>
                <input id="vocabulary-prefix" value="stock" autocomplete="off" />
              </label>
              <label>
                <span>目标模型</span>
                <select id="target-model">
                  <option value="fun-asr">fun-asr</option>
                  <option value="fun-asr-mtl">fun-asr-mtl</option>
                  <option value="fun-asr-mtl-2025-08-25">fun-asr-mtl-2025-08-25</option>
                </select>
              </label>
            </div>
            <div class="word-table" id="word-table"></div>
            <button type="submit">创建热词表</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>热词表管理</h2>
            <button class="icon-button" id="refresh-vocabularies" type="button" title="刷新热词表列表">
              ↻
            </button>
          </div>
          <div id="vocabulary-list" class="vocabulary-list">
            <p class="hint">加载中…</p>
          </div>
        </section>
      </section>

      <section class="panel">
        <h2>音频试转写</h2>
        <form id="transcription-form" class="stack">
          <div class="grid-form">
            <label>
              <span>模型</span>
              <select id="transcription-model">
                <option value="fun-asr">fun-asr</option>
                <option value="doubao-asr">doubao-asr</option>
              </select>
            </label>
            <label>
              <span>本次识别语言</span>
              <select id="transcription-language-hints">
                <option value="">跟随默认设置</option>
                <option value="zh">中文</option>
                <option value="en">英文</option>
                <option value="zh,en">中文 + 英文</option>
              </select>
            </label>
            <label>
              <span>本次热词表</span>
              <input id="transcription-vocabulary-id" placeholder="留空跟随默认设置" />
            </label>
            <label>
              <span>音频文件</span>
              <input id="audio-file" type="file" accept="audio/*,.wav,.mp3,.m4a,.aac,.flac,.ogg" />
            </label>
          </div>
          <button type="submit">开始转写</button>
        </form>
        <div class="recording-box">
          <div class="recording-head">
            <h3>录音测试</h3>
            <span id="recording-status">未录音</span>
          </div>
          <div class="button-row">
            <button id="start-recording" type="button">● 开始录音</button>
            <button id="stop-recording" type="button" disabled>■ 停止录音</button>
            <button id="transcribe-recording" type="button" disabled>转写录音</button>
          </div>
          <audio id="recorded-audio" controls></audio>
        </div>
      </section>

      <section class="panel output-panel">
        <div class="panel-heading">
          <h2>结果</h2>
          <button class="icon-button" id="clear-output" type="button" title="清空结果">
            ×
          </button>
        </div>
        <pre id="output">等待操作</pre>
      </section>

      <section class="panel log-panel">
        <div class="panel-heading">
          <div>
            <h2>实时日志</h2>
            <span id="log-stream-status">连接中</span>
          </div>
          <button class="icon-button" id="clear-logs" type="button" title="清空日志显示">
            ×
          </button>
        </div>
        <div id="logs" class="logs" aria-live="polite"></div>
      </section>
    </main>

    <script src="/static/admin.js"></script>
  </body>
</html>
